<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Italienisch-Deutsch Vokabeltrainer</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
      :root {
        --bg-color: #121212;
        --text-color: #e0e0e0;
        --row-bg: #1e1e1e;
        --header-bg: #2d2d2d;
        --border-color: #333333;
        --accent-color: #bb86fc;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0 0.25vw;
        padding: 2rem 0.75rem;
        line-height: 1.6;
        transition:
          background-color 0.3s,
          color 0.3s;
      }
      .table-row {
        display: grid;
        text-align: center;
        gap: 10px;
        padding: 6px;
        border-bottom: 1px solid var(--border-color);
        align-items: center;
        background-color: var(--row-bg);
      }
      .tr-id{
        color: rgb(67, 128, 186);
        font-size: 20px;
        font-weight: 800;
      }
      .tr-it {
        color: violet;
        font-weight: 600;
      }
      .header {
        font-weight: bold;
        background-color: var(--header-bg);
        border-radius: 5px 5px 0 0;
      }

      .delete-btn {
        cursor: pointer;
        background: none;
        border: none;
        font-size: 3rem;
        padding: 1rem 0;
        transition: transform 0.1s;
      }

      .empty-msg {
        text-align: center;
        color: #888;
        margin-top: 20px;
      }
      .delete-all-btn {
        margin-top: 20px;
        padding: 10px 16px;
        font-size: 1rem;
        border-radius: 8px;
        border: 1px solid var(--border-color);
        background-color: #ff4d4d;
        color: white;
        cursor: pointer;
        transition: all 0.2s ease;
      }
    </style>
  </head>
  <body data-theme="dark">

    <div id="vocabulary-list">
      <div class="table-row header">
        <div></div>
      </div>
      <div id="data-container"></div>
    </div>

    <script>
      // --- DEXIE LOGIK ---
      const db = new Dexie("ritrato_diavolo2  ");
      db.version(1).stores({
        phrases: "++id, it, de",
      });

      const initialPhrases = [
        {
          it: "I.",
          de: "I.",
        },
        {
          it: "Lettori gentili,",
          de: "Liebe Leser,",
        },
        {
          it: "siete mai stati ad Arezzo?",
          de: "Waren Sie schon einmal in Arezzo?",
        },
        {
          it: "Se non ci siete mai stati,",
          de: "Wenn Sie noch nie dort waren,",
        },
        {
          it: "vi prego di andarci alla prima occasione,",
          de: "gehen Sie bitte bei der ersten Gelegenheit dorthin,",
        },
        {
          it: "anche a costo di farla nascere,",
          de: "selbst um den Preis, dass sie geboren wird,",
        },
        {
          it: "o d'inventare un pretesto.",
          de: "oder einen Vorwand zu erfinden.",
        },
        {
          it: "Vi assicuro io che mi ringrazierete del consiglio.",
          de: "Ich versichere Ihnen, dass Sie mir für diesen Ratschlag dankbar sein werden.",
        },
        {
          it: 'La Val di Chiana è una tra le più amene e le più pittoresche "del bel paese là dove il sì suona".',
          de: 'Das Val di Chiana ist eines der schönsten und malerischsten "des schönen Landes, in dem das Ja klingt".',
        },
        {
          it: "Anzi,",
          de: "Im Gegenteil,",
        },
        {
          it: "un dilettante di bisticci potrebbe sostenere che il sì è nato proprio in Arezzo,",
          de: 'ein Laie könnte argumentieren, dass das "Ja" in Arezzo geboren wurde,',
        },
        {
          it: "poichè fu aretino quel monaco Guido,",
          de: "denn dieser Mönch Guido stammte aus Arezzo,",
        },
        {
          it: "a cui siamo debitori della scala armonica.",
          de: "dem wir die harmonische Tonleiter verdanken.",
        },
        {
          it: "Ma,",
          de: "Aber,",
        },
        {
          it: "a farlo apposta,",
          de: "absichtlich,",
        },
        {
          it: "Guido d'Arezzo non inventò che sei note,",
          de: "Guido d'Arezzo hat nur sechs Noten erfunden,",
        },
        {
          it: "dimenticando per l'appunto di inventare la settima.",
          de: "zu vergessen, die siebte zu erfinden.",
        },
        {
          it: "Forse,",
          de: "Vielleicht,",
        },
        {
          it: "ribatterà il dilettante di cui sopra,",
          de: "wird der oben erwähnte Amateur erwidern,",
        },
        {
          it: "Guido non ha inventato il si,",
          de: "Guido hat das Ja nicht erfunden,",
        },
        {
          it: "perchè questo era già nella lingua madre,",
          de: "denn das war bereits in der Muttersprache,",
        },
        {
          it: "o il brav'uomo non voleva farsi bello del sol di luglio.",
          de: "oder der gute Mann wollte sich in der Juli-Sonne nicht schön machen.",
        },
        {
          it: "Comunque sia,",
          de: "Wie dem auch sei,",
        },
        {
          it: "andate in Val di Chiana e smontate ad Arezzo.",
          de: "in das Val di Chiana fahren und in Arezzo absteigen.",
        },
        {
          it: "La città non è vasta,",
          de: "Die Stadt ist nicht groß,",
        },
        {
          it: "ma che importa?",
          de: "aber wen interessiert das schon?",
        },
        {
          it: "Il Guadagnoli,",
          de: "Die Guadagnoli,",
        },
        {
          it: "che era d'Arezzo,",
          de: "der aus Arezzo stammte,",
        },
        {
          it: "pensava forse alla sua terra,",
          de: "dachte vielleicht an sein Land,",
        },
        {
          it: "quando diceva ad una graziosa dama: Signora,",
          de: 'als er zu einer hübschen Dame sagte: "Madam,',
        },
        {
          it: "se l'essere Piccina d'aspetto Vi sembra difetto,",
          de: "wenn Sie es für einen Mangel halten, klein auszusehen,",
        },
        {
          it: "Difetto non è.",
          de: "Defekt ist nicht.",
        },
        {
          it: "A buon conto,",
          de: "Und das ist auch gut so,",
        },
        {
          it: "la città è piccola,",
          de: "die Stadt ist klein,",
        },
        {
          it: "ma ci ha le vie larghe,",
          de: "aber er hat breite Wege,",
        },
        {
          it: "pulite e ben selciate,",
          de: "sauber und gut gepflastert,",
        },
        {
          it: "il che non si trova mica da per tutto;",
          de: "die nicht überall zu finden ist;",
        },
        {
          it: "possiede molte ed insigni opere d'arte,",
          de: "verfügt über viele bedeutende Kunstwerke,",
        },
        {
          it: "un prefetto,",
          de: "einen Präfekten,",
        },
        {
          it: "un vescovo,",
          de: "einen Bischof,",
        },
        {
          it: "due buoni alberghi e un caffè dei Costanti,",
          de: "zwei gute Hotels und ein Konstanten-Café,",
        },
        {
          it: "che vi dà subito l'idea di una popolazione d'innamorati.",
          de: "was sofort auf eine Bevölkerung von Verliebten schließen lässt.",
        },
        {
          it: "La qual cosa non mi farebbe punto specie,",
          de: "Das wäre für mich keine schlechte Sache,",
        }
      ];

      async function initApp() {
        const count = await db.phrases.count();
        if (count === 0) {
          await db.phrases.bulkAdd(initialPhrases);
        }
        renderData();
      }

      async function renderData() {
        const container = document.getElementById("data-container");
        const allPhrases = await db.phrases.toArray();

        if (allPhrases.length === 0) {
          container.innerHTML =
            '<p class="empty-msg">Keine Einträge gefunden.</p>';
          return;
        }

        container.innerHTML = allPhrases
          .map(
            (item) => `
                            <div class="table-row">
                                <div class="tr-id">${item.id}</div>
                                <div class="tr-it">${item.it}</div>
                                <div class="tr-de">${item.de}</div>
                                <button class="delete-btn" onclick="deleteEntry(${item.id})" title="Löschen">🗑️</button>
                            </div>
                        `,
          )
          .join("");
      }

      async function deleteEntry(id) {
        await db.phrases.delete(id);
        renderData();
      }

      // --- UI LOGIK (Dark Mode) ---
      function toggleTheme() {
        const body = document.body;
        const currentTheme = body.getAttribute("data-theme");
        const newTheme = currentTheme === "dark" ? "light" : "dark";
        body.setAttribute("data-theme", newTheme);
      }

      async function deleteAllEntries() {
        if (!confirm("Wirklich alle Einträge löschen?")) return;
        await db.phrases.clear();
        renderData();
      }

      initApp();
    </script>
    <button onclick="deleteAllEntries()" class="delete-all-btn">
      Alle Einträge löschen
    </button>
  </body>
</html>

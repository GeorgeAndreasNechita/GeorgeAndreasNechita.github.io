<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Italienisch-Deutsch Vokabeltrainer</title>
    <style>
      :root {
        --bg-color: #121212;
        --text-color: #e0e0e0;
        --accent-color: #bb86fc;
        --secondary-color: violet;
        --id-color: rgb(67, 128, 186);
        --button-bg: #1e1e1e;
      }

      * { box-sizing: border-box; }

      body, html {
        margin: 0; padding: 0; height: 100%;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        overflow: hidden;
      }

      /* Oberer Bereich: 20% der Höhe */
      #display-area {
        height: 20vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 10px;
        border-bottom: 2px solid #333;
        position: relative;
      }

      .tr-id {
        color: var(--id-color);
        font-size: 2rem;
        font-weight: 800;
        margin-bottom: 5px;
      }

      .tr-it {
        color: var(--secondary-color);
        font-size: 1.4rem;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .tr-de {
        font-size: 1.4rem;
        opacity: 0.8;
      }

      /* Unterer Bereich: 80% der Höhe */
      #button-area {
        height: 80vh;
        width: 100%;
      }

      .next-btn {
        width: 100%;
        height: 100%;
        background-color: var(--button-bg);
        color: var(--accent-color);
        border: none;
        font-size: 5rem;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        transition: background-color 0.1s;
      }

      .next-btn:active { background-color: #2a2a2a; }

      .counter {
        font-size: 1.2rem;
        color: #666;
        margin-top: 15px;
        font-weight: normal;
      }

      .reset-btn {
        position: fixed;
        top: 10px;
        right: 10px;
        padding: 5px 10px;
        background: transparent;
        color: #444;
        border: 1px solid #333;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.7rem;
        z-index: 10;
      }
    </style>
  </head>
  <body>

    <button onclick="resetProgress()" class="reset-btn">Reset</button>

    <div id="display-area">
      <div id="content-container">
          </div>
    </div>

    <div id="button-area">
      <button class="next-btn" onclick="incrementIndex()">
        NEXT
        <div id="counter-display" class="counter"></div>
      </button>
    </div>

    <script>
      const initialPhrases = [
        { it: "I.", de: "I." },
        { it: "Lettori gentili,", de: "Liebe Leser," },
        { it: "siete mai stati ad Arezzo?", de: "Waren Sie schon einmal in Arezzo?" },
        { it: "Se non ci siete mai stati,", de: "Wenn Sie noch nie dort waren," },
        { it: "vi prego di andarci alla prima occasione,", de: "gehen Sie bitte bei der ersten Gelegenheit dorthin," },
        { it: "anche a costo di farla nascere,", de: "selbst um den Preis, dass sie geboren wird," },
        { it: "o d'inventare un pretesto.", de: "oder einen Vorwand zu erfinden." },
        { it: "Vi assicuro io che mi ringrazierete del consiglio.", de: "Ich versichere Ihnen, dass Sie mir für diesen Ratschlag dankbar sein werden." },
        { it: 'La Val di Chiana è una tra le più amene e le più pittoresche "del bel paese là dove il sì suona".', de: 'Das Val di Chiana ist eines der schönsten und malerischsten "des schönen Landes, in dem das Ja klingt".' },
        { it: "Anzi,", de: "Im Gegenteil," },
      ];

      function getCurrentIndex() {
        const index = localStorage.getItem("vokabel_index");
        return index ? parseInt(index) : 0;
      }

      function renderData() {
        const container = document.getElementById("content-container");
        const counter = document.getElementById("counter-display");
        const currentIndex = getCurrentIndex();
        const total = initialPhrases.length;

        if (currentIndex >= total) {
          container.innerHTML = '<div><strong>Ende erreicht!</strong></div>';
          counter.innerHTML = `${total} von ${total}`;
          document.querySelector('.next-btn').disabled = true;
          return;
        }

        const item = initialPhrases[currentIndex];
        
        // Anzeige oben (ID + Text)
        container.innerHTML = `
          <div class="tr-id"># ${currentIndex}</div>
          <div class="tr-it">${item.it}</div>
          <div class="tr-de">${item.de}</div>
        `;

        // Anzeige im Button (z.B. 1 of 10)
        // Wir nutzen currentIndex + 1 für die menschliche Zählweise (beginnend bei 1)
        counter.innerHTML = `${currentIndex + 1} of ${total}`;
        
        document.querySelector('.next-btn').disabled = false;
      }

      function incrementIndex() {
        const nextIndex = getCurrentIndex() + 1;
        if (nextIndex <= initialPhrases.length) {
            localStorage.setItem("vokabel_index", nextIndex);
            renderData();
        }
      }

      function resetProgress() {
        if (confirm("Fortschritt zurücksetzen?")) {
          localStorage.setItem("vokabel_index", 0);
          renderData();
        }
      }

      renderData();
    </script>
  </body>
</html>

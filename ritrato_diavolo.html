<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Italienisch-Deutsch Vokabeltrainer</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
      :root {
        --bg-color: #121212;
        --text-color: #e0e0e0;
        --row-bg: #1e1e1e;
        --header-bg: #2d2d2d;
        --border-color: #333333;
        --accent-color: #bb86fc;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0 0.25vw;
        padding: 2rem 0.75rem;
        line-height: 1.6;
        transition:
          background-color 0.3s,
          color 0.3s;
      }
      .table-row {
        display: grid;
        text-align: center;
        gap: 10px;
        padding: 6px;
        border-bottom: 1px solid var(--border-color);
        align-items: center;
        background-color: var(--row-bg);
      }
      .tr-id{
        color: rgb(67, 128, 186);
        font-size: 20px;
        font-weight: 800;
      }
      .tr-it {
        color: violet;
        font-weight: 600;
      }
      .header {
        font-weight: bold;
        background-color: var(--header-bg);
        border-radius: 5px 5px 0 0;
      }

      .delete-btn {
        cursor: pointer;
        background: none;
        border: none;
        font-size: 3rem;
        padding: 1rem 0;
        transition: transform 0.1s;
      }

      .empty-msg {
        text-align: center;
        color: #888;
        margin-top: 20px;
      }
      .delete-all-btn {
        margin-top: 20px;
        padding: 10px 16px;
        font-size: 1rem;
        border-radius: 8px;
        border: 1px solid var(--border-color);
        background-color: #ff4d4d;
        color: white;
        cursor: pointer;
        transition: all 0.2s ease;
      }
    </style>
  </head>
  <body data-theme="dark">

    <div id="vocabulary-list">
      <div class="table-row header">
        <div></div>
      </div>
      <div id="data-container"></div>
    </div>

    <script>
      const db = new Dexie("ritrato_diavolo2  ");
      db.version(1).stores({
        phrases: "++id, it, de",
      });

      const initialPhrases = [
        {
          it: "I.",
          de: "I.",
        },
        {
          it: "Lettori gentili,",
          de: "Liebe Leser,",
        },
        {
          it: "siete mai stati ad Arezzo?",
          de: "Waren Sie schon einmal in Arezzo?",
        },
        {
          it: "Se non ci siete mai stati,",
          de: "Wenn Sie noch nie dort waren,",
        },
        {
          it: "vi prego di andarci alla prima occasione,",
          de: "gehen Sie bitte bei der ersten Gelegenheit dorthin,",
        },
        {
          it: "anche a costo di farla nascere,",
          de: "selbst um den Preis, dass sie geboren wird,",
        },
        {
          it: "o d'inventare un pretesto.",
          de: "oder einen Vorwand zu erfinden.",
        },
        {
          it: "Vi assicuro io che mi ringrazierete del consiglio.",
          de: "Ich versichere Ihnen, dass Sie mir für diesen Ratschlag dankbar sein werden.",
        },
        {
          it: 'La Val di Chiana è una tra le più amene e le più pittoresche "del bel paese là dove il sì suona".',
          de: 'Das Val di Chiana ist eines der schönsten und malerischsten "des schönen Landes, in dem das Ja klingt".',
        },
        {
          it: "Anzi,",
          de: "Im Gegenteil,",
        }
      ];

      async function initApp() {
        const count = await db.phrases.count();
        if (count === 0) {
          await db.phrases.bulkAdd(initialPhrases);
        }
        renderData();
      }

      async function renderData() {
        const container = document.getElementById("data-container");
        const allPhrases = await db.phrases.toArray();

        if (allPhrases.length === 0) {
          container.innerHTML =
            '<p class="empty-msg">Keine Einträge gefunden.</p>';
          return;
        }

        container.innerHTML = allPhrases
          .map(
            (item) => `
                            <div class="table-row">
                                <div class="tr-id">${item.id}</div>
                                <div class="tr-it">${item.it}</div>
                                <div class="tr-de">${item.de}</div>
                                <button class="delete-btn" onclick="deleteEntry(${item.id})" title="Löschen">🗑️</button>
                            </div>
                        `,
          )
          .join("");
      }

      async function deleteEntry(id) {
        await db.phrases.delete(id);
        renderData();
      }

      // --- UI LOGIK (Dark Mode) ---
      function toggleTheme() {
        const body = document.body;
        const currentTheme = body.getAttribute("data-theme");
        const newTheme = currentTheme === "dark" ? "light" : "dark";
        body.setAttribute("data-theme", newTheme);
      }

      async function deleteAllEntries() {
        if (!confirm("Wirklich alle Einträge löschen?")) return;
        await db.phrases.clear();
        renderData();
      }

      initApp();
    </script>
    <button onclick="deleteAllEntries()" class="delete-all-btn">
      Alle Einträge löschen
    </button>
  </body>
</html>

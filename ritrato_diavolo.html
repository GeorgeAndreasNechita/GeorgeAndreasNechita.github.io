      :root {
        --bg-color: #121212;

        --secondary-color: violet;
        --id-color: rgb(67, 128, 186);
        --button-bg: #1e1e1e;
      }

      * {
        box-sizing: border-box;
      }

      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        overflow: hidden;
      }

      /* Oberer Bereich: 20% der Höhe */
      #display-area {
        height: 45vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 10px;
        border-bottom: 2px solid #333;
        position: relative;
      }

      #button-area {
        height: 55vh;
        width: 100%;
      }
      #content-container {
        margin-top: 10vh;
      }
      .tr-id {
        color: var(--id-color);
        font-size: 2rem;
        font-weight: 800;
        margin-bottom: 5px;
      }

      .tr-it {
        color: var(--secondary-color);
        margin-top: 1rem;
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .tr-de {
        margin-top: 0.3rem;
        font-size: 1.25rem;
        opacity: 0.8;
      }
      .next-btn {
        width: 100%;
        height: 100%;
        background-color: var(--button-bg);
        color: var(--accent-color);
        border: none;
        font-size: 5rem;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        transition: background-color 0.1s;
      }

      .next-btn:active {
        background-color: #2a2a2a;
      }

      .counter {
        font-size: 1.2rem;
        color: #666;
        margin-top: 15px;
        font-weight: normal;
      }

      .reset-btn {
        position: fixed;
        top: 10px;
        right: 10px;
        padding: 5px 10px;
        background: transparent;
        color: #444;
        border: 1px solid #333;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.7rem;
        z-index: 10;
      }
    </style>
  </head>

      function getCurrentIndex() {
        const index = localStorage.getItem("vokabel_index");
        return index ? parseInt(index) : 0;
      }

      function renderData() {
        const container = document.getElementById("content-container");
        const counter = document.getElementById("counter-display");
        const currentIndex = getCurrentIndex();
        const total = initialPhrases.length;

        if (currentIndex >= total) {
          container.innerHTML = "<div><strong>Ende erreicht!</strong></div>";
          counter.innerHTML = `${total} von ${total}`;
          document.querySelector(".next-btn").disabled = true;
          return;
        }

        const item = initialPhrases[currentIndex];

        // Combined Speech Logic
        if (item) {
          window.speechSynthesis.cancel(); // Clear current queue

          // 1. Italian Utterance
          const msgIt = new SpeechSynthesisUtterance(item.it);
          msgIt.lang = "it-IT";
          
          // 2. German Utterance
          const msgDe = new SpeechSynthesisUtterance(item.de);
          msgDe.lang = "de-DE";

          // Speak them in order
          window.speechSynthesis.speak(msgIt);
          window.speechSynthesis.speak(msgDe);
        }

        // Anzeige oben (ID + Text)
        container.innerHTML = `
          <div class="tr-id"># ${currentIndex}</div>
          <div class="tr-it">${item.it}</div>
          <div class="tr-de">${item.de}</div>
        `;

        // Anzeige im Button (z.B. 1 of 10)
        counter.innerHTML = `${currentIndex + 1} of ${total}`;

        document.querySelector(".next-btn").disabled = false;
      }

      function incrementIndex() {
        const nextIndex = getCurrentIndex() + 1;
        if (nextIndex <= initialPhrases.length) {
          localStorage.setItem("vokabel_index", nextIndex);
          renderData();
        }
      }

      function resetProgress() {
        if (confirm("Fortschritt zurücksetzen?")) {
          localStorage.setItem("vokabel_index", 0);
          renderData();
        }
      }

      renderData();
    </script>

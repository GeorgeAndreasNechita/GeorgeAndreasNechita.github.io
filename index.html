    <style>
      :root {
        --bg-color: #121212;
        --text-color: #e0e0e0;
        --accent-color: #bb86fc;
        --secondary-color: violet;
        --id-color: rgb(67, 128, 186);
        --button-bg: #1e1e1e;
        --success-color: #4caf50;
        --danger-color: #cf6679;
      }

      * {
        box-sizing: border-box;
      }

      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        overflow: hidden;
      }

      #display-area {
        height: 45vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 10px;
        border-bottom: 2px solid #333;
        position: relative;
      }

      #button-area {
        height: 55vh;
        width: 100%;
      }

      #content-container {
        margin-top: 11vh;
      }

      .tr-it {
        color: var(--secondary-color);
        margin-top: 0.5rem;
        font-size: 1.15rem;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .tr-de {
        margin-top: 0.3rem;
        font-size: 1.15rem;
        opacity: 0.8;
        margin-bottom: 20px;
      }

      /* Neuer Repeat Button Style */
      .repeat-btn {
        width: 33%;
        padding: 8px;
        background: transparent;
        border: 1px solid var(--accent-color);
        color: var(--accent-color);
        border-radius: 20px;
        cursor: pointer;
        font-size: 0.8rem;
        font-weight: bold;
        transition: all 0.2s ease;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .repeat-btn:active {
        background: rgba(187, 134, 252, 0.2);
        transform: scale(0.95);
      }

      .next-btn {
        width: 100%;
        height: 100%;
        background-color: var(--button-bg);
        color: var(--accent-color);
        border: none;
        font-size: 5rem;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        transition: background-color 0.1s;
      }

      .next-btn:active {
        background-color: #2a2a2a;
      }

      .counter {
        font-size: 1.2rem;
        color: #666;
        margin-top: 15px;
        font-weight: normal;
      }

      .top-btn {
        position: fixed;
        top: 10px;
        padding: 6px 12px;
        background: #222;
        color: #888;
        border: 1px solid #444;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.75rem;
        z-index: 10;
        font-weight: bold;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .reset-btn {
        right: 10px;
      }

      #audio-toggle {
        right: 90px;
      }

      .audio-on {
        border-color: var(--success-color);
        color: var(--success-color);
        background: rgba(76, 175, 80, 0.1);
      }

      .audio-off {
        border-color: var(--danger-color);
        color: var(--danger-color);
        background: rgba(207, 102, 121, 0.1);
      }
    </style>
  </head>
  <body>
    <button id="audio-toggle" onclick="toggleSpeech()" class="top-btn audio-on">
      <span>🔊</span> Ton: AN
    </button>
    <button onclick="resetProgress()" class="top-btn reset-btn">Reset</button>

    <div id="display-area">
      <div id="content-container"></div>
      <button
        id="repeat-btn-el"
        class="repeat-btn"
        onclick="speakCurrent()"
        style="display: none"
      >
        Repeat ↻
      </button>
    </div>

    <div id="button-area">
      <button class="next-btn" onclick="incrementIndex()">
        NEXT
        <div id="counter-display" class="counter"></div>
      </button>
    </div>

        return setting === null ? true : setting === "true";

      }

          btn.className = "top-btn audio-on";
        } else {
          btn.innerHTML = "<span>🔇</span> Ton: AUS";
          btn.className = "top-btn audio-off";
        }
      }

      // Neue Funktion für die Sprachausgabe (schneller eingestellt)
      function speakCurrent() {
        const currentIndex = getCurrentIndex();
        const item = initialPhrases[currentIndex];

        if (item && isSpeechEnabled()) {
          window.speechSynthesis.cancel();

          const msgIt = new SpeechSynthesisUtterance(item.it);
          msgIt.lang = "it-IT";
          msgIt.rate = 1.1;

          const msgDe = new SpeechSynthesisUtterance(item.de);
          msgDe.lang = "de-DE";
          msgDe.rate = 1.1;

          window.speechSynthesis.speak(msgIt);
          window.speechSynthesis.speak(msgDe);
        }
      }

      function renderData() {
        const container = document.getElementById("content-container");
        const counter = document.getElementById("counter-display");
        const repeatBtn = document.getElementById("repeat-btn-el");
        const currentIndex = getCurrentIndex();
        const total = initialPhrases.length;

        updateAudioButtonUI();

        if (currentIndex >= total) {
          container.innerHTML = "<div><strong>Ende erreicht!</strong></div>";
          counter.innerHTML = `${total} von ${total}`;
          repeatBtn.style.display = "none";
          document.querySelector(".next-btn").disabled = true;
          return;
        }

        const item = initialPhrases[currentIndex];

        container.innerHTML = `
          <div class="tr-it">${item.it}</div>
          <div class="tr-de">${item.de}</div>
        `;

        // Repeat Button anzeigen
        repeatBtn.style.display = "block";

        // Sprache beim ersten Laden/Wechseln triggern
        speakCurrent();

        counter.innerHTML = `${currentIndex + 1} of ${total}`;
        document.querySelector(".next-btn").disabled = false;
      }

      function incrementIndex() {
        const nextIndex = getCurrentIndex() + 1;
        if (nextIndex <= initialPhrases.length) {
          localStorage.setItem("vokabel_index", nextIndex);
          renderData();
        }
      }

      function resetProgress() {
        if (confirm("Fortschritt zurücksetzen?")) {
          localStorage.setItem("vokabel_index", 0);
          renderData();
        }
      }

      renderData();
    </script>
  </body>
</html>

<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Italienisch-Deutsch Vokabeltrainer</title>
    <style>
      :root {
        --bg-color: #121212;
        --text-color: #e0e0e0;
        --accent-color: #bb86fc;
        --secondary-color: violet;
        --button-bg: #1e1e1e;
        --danger-color: #cf6679;

        /* Stufen-Farben */
        --color-off: #444;
        --color-1x: #4caf50;
        --color-2x: #ffb74d;
        --color-3x: #bb86fc;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent; /* Entfernt den blauen Kasten beim Tabben auf Android/iOS */
      }
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: "Segoe UI", sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        overflow: hidden;
      }

      /* Obere Steuerungs-Leiste */
      .top-controls {
        position: fixed;
        top: 10px;
        left: 10px;
        right: 10px;
        display: flex;
        gap: 8px;
        z-index: 10;
        justify-content: flex-end;
      }

      .top-btn {
        padding: 8px 14px;
        background: #1e1e1e;
        color: #888;
        border: 2px solid var(--color-off);
        border-radius: 12px;
        cursor: pointer;
        font-size: 0.75rem;
        font-weight: bold;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        align-items: center;
        gap: 5px;
      }

      /* Dynamische Klassen für die Wiederholungen */
      .state-off {
        border-color: var(--color-off);
        color: #555;
        opacity: 0.6;
      }

      .state-1x {
        border-color: var(--color-1x);
        color: var(--color-1x);
        background: rgba(76, 175, 80, 0.1);
      }

      .state-2x {
        border-color: var(--color-2x);
        color: var(--color-2x);
        background: rgba(255, 183, 77, 0.15);
        box-shadow: 0 0 10px rgba(255, 183, 77, 0.1);
      }

      .state-3x {
        border-color: var(--color-3x);
        color: var(--color-3x);
        background: rgba(187, 134, 252, 0.2);
        box-shadow: 0 0 15px rgba(187, 134, 252, 0.3);
        transform: scale(1.05);
      }

      /* Hauptbereich */
      #display-area {
        height: 45vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        border-bottom: 2px solid #333;
      }
      #content-container {
        margin: 12vh 10px 0;
      }
      .tr-it {
        color: var(--secondary-color);
        font-size: 1.15rem;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .tr-de {
        font-size: 1.15rem;
        opacity: 0.7;
        margin-bottom: 25px;
      }

      /* OPTIMIERTER REPEAT BUTTON */
      .repeat-btn {
        padding: 20px 60px;
        min-width: 200px;
        background: rgba(187, 134, 252, 0.05);
        border: 2px solid var(--accent-color);
        color: var(--accent-color);
        border-radius: 50px; /* Rundere Ecken für besseres Daumengefühl */
        cursor: pointer;
        font-weight: bold;
        font-size: 1.1rem;
        transition: transform 0.1s ease, background 0.2s;
        touch-action: manipulation;
      }
      
      .repeat-btn:active {
        transform: scale(0.92); /* Deutliches Drück-Feedback */
        background: rgba(187, 134, 252, 0.2);
      }

      #button-area {
        height: 55vh;
        width: 100%;
      }

      /* OPTIMIERTER NEXT BUTTON */
      .next-btn {
        width: 100%;
        height: 100%;
        background: linear-gradient(to bottom, #1e1e1e, #181818);
        color: var(--accent-color);
        border: none;
        font-size: 4.5rem;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        transition: background 0.1s, transform 0.1s;
        touch-action: manipulation;
      }

      .next-btn:active {
        background: #252525;
        transform: scale(0.98); /* Minimale Stauchung gibt Gefühl von Tiefe */
      }

      .next-btn:disabled {
        opacity: 0.3;
        filter: grayscale(1);
      }

      .counter {
        font-size: 1rem;
        color: #666;
        margin-top: 15px;
        letter-spacing: 2px;
      }
    </style>
  </head>
  <body>
    <div class="top-controls">
      <button id="it-toggle" onclick="cycleIt()" class="top-btn">IT: --</button>
      <button id="de-toggle" onclick="cycleDe()" class="top-btn">DE: --</button>
      <button onclick="changeIndex()" class="top-btn">Change Index</button>
    </div>

    <div id="display-area">
      <div id="content-container">Lade...</div>
      <button
        id="repeat-btn-el"
        class="repeat-btn"
        onclick="speakCurrent()"
        style="display: none"
      >
        Repeat ↻
      </button>
    </div>

    <div id="button-area">
      <button class="next-btn" onclick="incrementIndex()" disabled>
        NEXT
        <div id="counter-display" class="counter"></div>
      </button>
    </div>

    <script>
      let texts = [];
      let settings = {
        itRepeat: parseInt(localStorage.getItem("itRepeat") || "1"),
        deRepeat: parseInt(localStorage.getItem("deRepeat") || "1"),
      };

      async function loadTexts() {
        try {
          const url = "https://raw.githubusercontent.com/GeorgeAndreasNechita/GeorgeAndreasNechita.github.io/refs/heads/main/texts.json";
          const cacheBuster = `?t=${Date.now()}`;
          const res = await fetch(url + cacheBuster);
          if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
          texts = await res.json();
          updateButtonsUI();
          renderData();
        } catch (e) {
          console.error("Fehler beim Laden der JSON:", e);
        }
      }

      function cycleIt() {
        settings.itRepeat = (settings.itRepeat + 1) % 4;
        save();
        updateButtonsUI();
      }

      function cycleDe() {
        settings.deRepeat = (settings.deRepeat + 1) % 2;
        save();
        updateButtonsUI();
      }

      function save() {
        localStorage.setItem("itRepeat", settings.itRepeat);
        localStorage.setItem("deRepeat", settings.deRepeat);
      }

      function updateButtonsUI() {
        const itBtn = document.getElementById("it-toggle");
        const deBtn = document.getElementById("de-toggle");
        itBtn.innerHTML = `🇮🇹 IT: ${settings.itRepeat === 0 ? "AUS" : settings.itRepeat + "x"}`;
        itBtn.className = "top-btn " + (settings.itRepeat === 0 ? "state-off" : "state-" + settings.itRepeat + "x");
        deBtn.innerHTML = `🇩🇪 DE: ${settings.deRepeat === 0 ? "AUS" : "1x"}`;
        deBtn.className = "top-btn " + (settings.deRepeat === 0 ? "state-off" : "state-1x");
      }

      function speakCurrent() {
        const item = texts[getCurrentIndex()];
        if (!item) return;
        window.speechSynthesis.cancel();
        for (let i = 0; i < settings.itRepeat; i++) {
          const m = new SpeechSynthesisUtterance(item.it);
          m.lang = "it-IT";
          window.speechSynthesis.speak(m);
        }
        for (let i = 0; i < settings.deRepeat; i++) {
          const m = new SpeechSynthesisUtterance(item.de);
          m.lang = "de-DE";
          window.speechSynthesis.speak(m);
        }
      }

      function getCurrentIndex() {
        return parseInt(localStorage.getItem("vokabel_index") || "0");
      }

      function renderData() {
        const idx = getCurrentIndex();
        const container = document.getElementById("content-container");
        const nextBtn = document.querySelector(".next-btn");
        if (idx >= texts.length) {
          container.innerHTML = "Ende!";
          nextBtn.disabled = true;
          return;
        }
        container.innerHTML = `<div class="tr-it">${texts[idx].it}</div><div class="tr-de">${texts[idx].de}</div>`;
        document.getElementById("repeat-btn-el").style.display = "inline-block";
        document.getElementById("counter-display").innerHTML = `${idx + 1} von ${texts.length}`;
        nextBtn.disabled = false;
        speakCurrent();
      }

      function incrementIndex() {
        localStorage.setItem("vokabel_index", getCurrentIndex() + 1);
        renderData();
      }

      function changeIndex() {
        const val = prompt(`Index eingeben (1 - ${texts.length}):`, getCurrentIndex() + 1);
        if (val !== null) {
          const newIdx = parseInt(val) - 1;
          if (!isNaN(newIdx) && newIdx >= 0 && newIdx < texts.length) {
            localStorage.setItem("vokabel_index", newIdx);
            renderData();
          } else {
            alert("Ungültiger Index!");
          }
        }
      }
      loadTexts();
    </script>
  </body>
</html>
